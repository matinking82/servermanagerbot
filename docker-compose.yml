services:
  db:
    image: mariadb:11
    container_name: basebot-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-mydb}
      MYSQL_USER: ${DB_USER:-basebot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - basebot-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: basebot-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${DB_USER:-basebot}:${DB_PASSWORD:-root}@db:3306/${DB_NAME:-mydb}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - basebot-network

volumes:
  db_data:

networks:
  basebot-network:
    driver: bridge
